services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kokusei}
      POSTGRES_USER: ${POSTGRES_USER:-kokusei}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kokusei}
    ports:
      # Database access is kept on the host only; phones only need the web port.
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations/001_init.up.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./database/migrations/002_indicator_value_provenance.up.sql:/docker-entrypoint-initdb.d/02_provenance.sql:ro
      - ./database/seeds/001_development.sql:/docker-entrypoint-initdb.d/03_development_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://kokusei:kokusei@database:5432/kokusei?sslmode=disable}
      PORT: "8080"
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-http://localhost:3000}
    ports:
      # The browser uses Next.js; keep direct API access on the host only.
      - "127.0.0.1:8080:8080"
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    environment:
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:8080}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "3000:3000"
    depends_on:
      - backend

  population-import:
    build: ./backend
    profiles: ["tools"]
    entrypoint: ["/import-population"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://kokusei:kokusei@database:5432/kokusei?sslmode=disable}
      ESTAT_POPULATION_STAT_INF_ID: ${ESTAT_POPULATION_STAT_INF_ID:-000040462410}
      ESTAT_POPULATION_PUBLISHED_AT: ${ESTAT_POPULATION_PUBLISHED_AT:-2026-06-19}
    depends_on:
      database:
        condition: service_healthy

volumes:
  postgres_data:
